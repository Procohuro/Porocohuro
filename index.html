<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imagem</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #nome {
      position: fixed;
      bottom: 10px;
      right: 15px;
      color: rgba(255,255,255,0.3);
      font-size: 20px;
      pointer-events: none;
      z-index: 10;
    }

    #img {
      position: absolute;
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: none;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div id="nome">procohuro</div>

  <img id="img" src="https://live.staticflickr.com/6068/6065510171_bb00e7222b_z.jpg" alt="imagem">

  <video id="video" preload="auto" controls>
    <source src="Rick%20roll_%20but%20with%20different%20link(720P_HD).mp4" type="video/mp4">
  </video>

  <script>
    const img = document.getElementById("img");
    const video = document.getElementById("video");

    setTimeout(async () => {
      img.style.display = "none";
      video.style.display = "block";
      video.volume = 1.0;

      try {
        await video.play();
      } catch (e) {
        console.log("Autoplay bloqueado.");
      }
    }, 5000);

    document.addEventListener("click", async () => {
      video.volume = 1.0;
      try {
        await video.play();
      } catch (e) {}
    });
  </script>

</body>
</html>
