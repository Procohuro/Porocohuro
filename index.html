<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imagem</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #img, #video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    #video {
      display: none;
    }
  </style>
</head>
<body>
  <img id="img" src="https://live.staticflickr.com/6068/6065510171_bb00e7222b_z.jpg" alt="imagem">

  <video id="video" preload="auto">
    <source src="video.mp4" type="video/mp4">
  </video>

  <script>
    const img = document.getElementById("img");
    const video = document.getElementById("video");

    setTimeout(async () => {
      img.style.display = "none";
      video.style.display = "block";
      video.volume = 1.0;

      try {
        await video.play();
      } catch (e) {
        console.log("Autoplay com som foi bloqueado pelo navegador.");
      }
    }, 5000);

    document.addEventListener("click", async () => {
      video.volume = 1.0;
      try {
        await video.play();
      } catch (e) {
        console.log("Ainda bloqueado.");
      }
    });
  </script>
</body>
</html>
